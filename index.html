<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Na Ryby</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="./styles/style.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="top-bar">
        <button id="addSpotBtn" class="action-btn primary" type="button">+ Dodaj punkt</button>
        <button id="myLocationBtn" class="action-btn" type="button">Moja lokalizacja</button>
        <button id="exportBtn" class="action-btn" type="button">Eksport</button>
        <button id="importBtn" class="action-btn" type="button">Import</button>
        <input id="importInput" type="file" accept=".json,application/json" hidden />
      </header>

      <main id="map" aria-label="Mapa miejsc wędkarskich"></main>

      <div class="map-hud" aria-live="polite">
        <div class="center-target" aria-hidden="true">
          <span class="target-line horizontal"></span>
          <span class="target-line vertical"></span>
          <span class="target-ring"></span>
        </div>
        <div class="center-readout" aria-label="Współrzędne środka mapy">
          <span class="readout-label">Środek mapy</span>
          <strong id="centerCoordinates">--, --</strong>
        </div>
      </div>

      <aside id="spotPanel" class="spot-panel" aria-label="Lista miejsc wędkarskich">
        <button id="panelToggleBtn" class="panel-toggle" type="button" aria-expanded="false">
          Miejsca i dziennik
        </button>
        <div class="panel-content">
          <div class="panel-tabs" role="tablist" aria-label="Widoki aplikacji">
            <button id="spotsTabBtn" class="tab-btn active" type="button" data-view="spots">Miejsca</button>
            <button id="journalTabBtn" class="tab-btn" type="button" data-view="journal">Dziennik</button>
          </div>
          <h2 id="panelTitle" class="panel-title">Zapisane miejsca</h2>
          <ul id="spotList" class="spot-list"></ul>
          <ul id="journalList" class="journal-list" hidden></ul>
        </div>
      </aside>
    </div>

    <dialog id="spotDialog" class="spot-dialog">
      <form id="spotForm" class="spot-form" method="dialog">
        <h2 id="spotFormTitle" class="form-title">Dodaj miejsce</h2>
        <p id="spotCoordinates" class="coordinates"></p>

        <label>
          Nazwa *
          <input id="spotName" name="name" type="text" required maxlength="60" />
        </label>

        <label>
          Typ wody
          <select id="waterType" name="waterType">
            <option value="Rzeka">Rzeka</option>
            <option value="Jezioro">Jezioro</option>
            <option value="Staw">Staw</option>
            <option value="Kanał">Kanał</option>
            <option value="Inne">Inne</option>
          </select>
        </label>

        <label>
          Ryby
          <input id="fishSpecies" name="fishSpecies" type="text" maxlength="120" />
        </label>

        <label>
          Notatki
          <textarea id="notes" name="notes" rows="3" maxlength="300"></textarea>
        </label>

        <div class="form-actions">
          <button id="cancelSpotBtn" type="button" class="action-btn">Anuluj</button>
          <button type="submit" class="action-btn primary">Zapisz</button>
        </div>
      </form>
    </dialog>

    <dialog id="journalDialog" class="spot-dialog">
      <form id="journalForm" class="spot-form" method="dialog">
        <h2 id="journalFormTitle" class="form-title">Dodaj wpis</h2>
        <p id="journalSpotName" class="coordinates"></p>

        <label>
          Data
          <input id="journalDate" name="date" type="date" required />
        </label>

        <label>
          Połów
          <input
            id="journalCatch"
            name="catchSummary"
            type="text"
            maxlength="120"
            placeholder="np. 2 okonie, szczupak 54 cm"
          />
        </label>

        <label>
          Warunki
          <input
            id="journalConditions"
            name="conditions"
            type="text"
            maxlength="120"
            placeholder="pogoda, poziom wody, wiatr"
          />
        </label>

        <label>
          Notatka
          <textarea id="journalNotes" name="notes" rows="3" maxlength="500"></textarea>
        </label>

        <div class="form-actions">
          <button id="cancelJournalBtn" type="button" class="action-btn">Anuluj</button>
          <button type="submit" class="action-btn primary">Zapisz wpis</button>
        </div>
      </form>
    </dialog>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
